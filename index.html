<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/piyush.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piyush Shakya</title>

  <style>
    /* Splash Screen */
    #splash {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      flex-direction: column;
      color: white;
      font-family: sans-serif;
    }

    #splash img {
      width: 120px;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

  </style>

</head>

<body>

  <!-- Splash Screen -->
  <div id="root">
    <div id="splash">
      <img src="/src/assets/piyush.jpg" alt="logo"/>
      <p>Loading Portfolio...</p>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
